<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio | Muhammad Ramanda Hidayat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        
        /* Background utama dengan gradient biru */
        .gradient-bg { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); }
        
        .project-card:hover { transform: translateY(-5px); transition: all 0.3s ease; }
        .img-container { background-color: #1e293b; display: flex; align-items: center; justify-content: center; color: white; overflow: hidden; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }

        /* --- EFEK BAYANGAN RANGKAIAN TEKNIS (web.jpeg) --- */
        .hero-with-bg {
            position: relative; 
            overflow: hidden;
        }

        /* Ini adalah bayangan gambar rangkaian kabel Anda */
        .hero-with-bg::before {
            content: "";
            position: absolute;
            top: 0; 
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('web.jpeg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            /* Pengaturan Transparansi agar terlihat seperti watermark */
            opacity: 0.15;       /* Nilai 0.15 membuat gambar samar-samar di belakang biru */
            filter: grayscale(100%) brightness(1.2) contrast(1.1); /* Membuatnya hitam putih dan lebih terang */
            
            z-index: 1; 
            pointer-events: none;
        }

        /* Konten (Teks & Tombol) harus di depan bayangan */
        .hero-content {
            position: relative;
            z-index: 10;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <!-- Navigasi -->
    <nav class="fixed w-full z-50 bg-white/80 backdrop-blur-md shadow-sm">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <span class="font-bold text-xl tracking-tight text-blue-800">Muhammad Ramanda Hidayat</span>
            <div class="hidden md:flex space-x-8 font-medium">
                <a href="#home" class="hover:text-blue-600 transition">Beranda</a>
                <a href="#about" class="hover:text-blue-600 transition">Tentang</a>
                <a href="#skills" class="hover:text-blue-600 transition">Keahlian</a>
                <a href="#projects" class="hover:text-blue-600 transition">Proyek</a>
                <a href="#contact" class="hover:text-blue-600 transition text-blue-700 font-bold">Kontak</a>
            </div>
            <button class="md:hidden text-2xl"><i class="fa-solid fa-bars"></i></button>
        </div>
    </nav>

    <!-- Hero Section dengan Bayangan Teknis -->
    <section id="home" class="min-h-screen flex items-center pt-20 gradient-bg text-white hero-with-bg">
        <div class="max-w-6xl mx-auto px-4 grid md:grid-cols-2 gap-12 items-center hero-content">
            <div>
                <div class="inline-block px-4 py-1 rounded-full bg-blue-400/30 border border-blue-200 text-sm font-semibold mb-6">
                    <i class="fa-solid fa-certificate mr-2"></i>Senior Engineer Sertifikasi BNSP
                </div>
                <h1 class="text-4xl md:text-6xl font-bold leading-tight mb-6">
                    Muhammad Ramanda Hidayat
                </h1>
                <p class="text-xl text-blue-100 mb-8 max-w-lg">
                    Lulusan Sarjana Terapan Teknik Elektro yang berfokus pada sistem otomasi industri, pemeliharaan preventif, dan solusi berbasis IoT.
                </p>
                <div class="flex flex-wrap gap-4">
                    <a href="#projects" class="bg-white text-blue-800 px-8 py-3 rounded-lg font-bold hover:bg-blue-50 transition shadow-lg">Lihat Proyek</a>
                    <a href="#contact" class="border-2 border-white px-8 py-3 rounded-lg font-bold hover:bg-white/10 transition">Hubungi Saya</a>
                </div>
            </div>
            
            <!-- Foto Profil Utama -->
            <div class="hidden md:flex justify-center">
                <div class="w-80 h-80 rounded-2xl border-4 border-white/20 overflow-hidden shadow-2xl rotate-3 hover:rotate-0 transition-all duration-500 bg-slate-800">
                    <img src="foto-profil.jpeg" alt="Muhammad Ramanda Hidayat" class="w-full h-full object-cover" 
                         onerror="this.style.display='none'; this.parentElement.innerHTML='<div class=\'w-full h-full flex flex-col items-center justify-center p-4 text-center\'><i class=\'fa-solid fa-user text-5xl mb-2\'></i><span class=\'text-xs opacity-75\'>Gunakan file: foto-profil.jpeg</span></div>';">
                </div>
            </div>
        </div>
    </section>

    <!-- Sisa bagian website tetap sama -->
    
</body>
</html>
